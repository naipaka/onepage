name: scroll_calendar
description: A new Flutter package project.
version: 1.0.0
publish_to: "none"

environment:
  sdk: ^3.12.2

resolution: workspace

dependencies:
  clock: ^1.1.2
  flutter:
    sdk: flutter
  gap: ^3.0.1
  # Because flutter depends on intl 0.20.2.
