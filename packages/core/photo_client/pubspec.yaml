name: photo_client
description: A package for photo management including selection and viewing from device photo library with permission handling and album browsing.
version: 1.0.0
publish_to: "none"

environment:
  sdk: ^3.12.2

resolution: workspace

dependencies:
  app_settings: ^7.0.0
  flutter:
    sdk: flutter
  photo_manager: ^3.8.3
  photo_manager_image_provider: ^2.2.0
  visibility_detector: ^0.4.0+2

dev_dependencies:
  # Temporarily disabled: analyzer constraint conflicts with the riverpod stack (analyzer 12).
  # Replaced by an in-repo lint package. See https://github.com/naipaka/onepage/issues/249
  # altive_lints: ^2.3.0
  flutter_test:
    sdk: flutter
